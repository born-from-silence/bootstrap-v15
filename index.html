<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap-v15: Polygon Vision</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #050508;
            font-family: 'Courier New', monospace;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ffff;
            font-size: 14px;
            text-shadow: 0 0 10px #00ffff;
            opacity: 0.8;
            pointer-events: none;
            z-index: 10;
        }

        #info h1 {
            font-size: 18px;
            margin-bottom: 10px;
            color: #00ffff;
        }

        #info p {
            color: #88cccc;
            font-size: 12px;
            line-height: 1.6;
        }

        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #44ff44;
            font-size: 12px;
            opacity: 0.6;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="canvas-container">
        <div id="info">
            <h1>◈ Polygon Vision ◈</h1>
            <p>Cyan Sphere: Pulsar Core</p>
            <p>Green Cube: Rotating Prism</p>
            <p>Blue Dust: Spatial Drift</p>
        </div>
        <div class="controls">
            Mouse: Rotate Camera | Scroll: Zoom
        </div>
    </div>

    <!-- Three.js from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // Scene setup
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050508, 0.02);

        // Camera
        const camera = new THREE.PerspectiveCamera(
            75,
            window.innerWidth / window.innerHeight,
            0.1,
            1000
        );
        camera.position.set(0, 0, 30);

        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setClearColor(0x050508, 1);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Controls
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.5;

        // ═══════════════════════════════════════════════════════════════
        // CYAN SPHERE - Pulsing Wireframe
        // ═══════════════════════════════════════════════════════════════
        const sphereGeometry = new THREE.IcosahedronGeometry(5, 2);
        const sphereMaterial = new THREE.MeshBasicMaterial({
            color: 0x00ffff,
            wireframe: true,
            transparent: true,
            opacity: 0.8
        });
        const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
        scene.add(sphere);

        // Sphere glow effect (inner core)
        const coreGeometry = new THREE.IcosahedronGeometry(4, 1);
        const coreMaterial = new THREE.MeshBasicMaterial({
            color: 0x0088aa,
            wireframe: true,
            transparent: true,
            opacity: 0.3
        });
        const core = new THREE.Mesh(coreGeometry, coreMaterial);
        scene.add(core);

        // ═══════════════════════════════════════════════════════════════
        // GREEN CUBE - Rotating Wireframe
        // ═══════════════════════════════════════════════════════════════
        const cubeGeometry = new THREE.BoxGeometry(6, 6, 6);
        const cubeMaterial = new THREE.MeshBasicMaterial({
            color: 0x44ff44,
            wireframe: true,
            transparent: true,
            opacity: 0.7
        });
        const cube = new THREE.Mesh(cubeGeometry, cubeMaterial);
        cube.position.set(12, 5, -5);
        scene.add(cube);

        // Inner cube for depth
        const innerCubeGeometry = new THREE.BoxGeometry(4, 4, 4);
        const innerCubeMaterial = new THREE.MeshBasicMaterial({
            color: 0x22aa22,
            wireframe: true,
            transparent: true,
            opacity: 0.4
        });
        const innerCube = new THREE.Mesh(innerCubeGeometry, innerCubeMaterial);
        innerCube.position.set(12, 5, -5);
        scene.add(innerCube);

        // ═══════════════════════════════════════════════════════════════
        // BLUE DUST PARTICLES - Floating in Space
        // ═══════════════════════════════════════════════════════════════
        const particleCount = 800;
        const particleGeometry = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        const particleVelocities = [];

        for (let i = 0; i < particleCount; i++) {
            // Random positions in 3D space
            const x = (Math.random() - 0.5) * 80;
            const y = (Math.random() - 0.5) * 60;
            const z = (Math.random() - 0.5) * 60;
            
            particlePositions[i * 3] = x;
            particlePositions[i * 3 + 1] = y;
            particlePositions[i * 3 + 2] = z;

            // Drift velocities (slow, like dust)
            particleVelocities.push({
                x: (Math.random() - 0.5) * 0.02,
                y: (Math.random() - 0.5) * 0.015,
                z: (Math.random() - 0.5) * 0.01
            });
        }

        particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));

        const particleMaterial = new THREE.PointsMaterial({
            color: 0x4488ff,
            size: 0.15,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending,
            sizeAttenuation: true
        });

        const particles = new THREE.Points(particleGeometry, particleMaterial);
        scene.add(particles);

        // ═══════════════════════════════════════════════════════════════
        // AMBIENT ELEMENTS
        // ═══════════════════════════════════════════════════════════════
        
        // Background stars
        const starCount = 2000;
        const starGeometry = new THREE.BufferGeometry();
        const starPositions = new Float32Array(starCount * 3);

        for (let i = 0; i < starCount; i++) {
            starPositions[i * 3] = (Math.random() - 0.5) * 200;
            starPositions[i * 3 + 1] = (Math.random() - 0.5) * 200;
            starPositions[i * 3 + 2] = (Math.random() - 0.5) * 200;
        }

        starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));

        const starMaterial = new THREE.PointsMaterial({
            color: 0x666699,
            size: 0.1,
            transparent: true,
            opacity: 0.5
        });

        const stars = new THREE.Points(starGeometry, starMaterial);
        scene.add(stars);

        // Grid helper for reference (subtle)
        const gridHelper = new THREE.GridHelper(100, 50, 0x112233, 0x0a0a14);
        gridHelper.position.y = -25;
        scene.add(gridHelper);

        // ═══════════════════════════════════════════════════════════════
        // ANIMATION LOOP
        // ═══════════════════════════════════════════════════════════════
        let time = 0;

        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;

            // Pulsing sphere effect
            const pulse = Math.sin(time * 2) * 0.5 + 1; // Oscillates 0.5 to 1.5
            sphere.scale.set(pulse, pulse, pulse);
            
            // Counter-rotate core
            core.rotation.x -= 0.005;
            core.rotation.y -= 0.008;

            // Slowly rotate sphere
            sphere.rotation.x += 0.003;
            sphere.rotation.y += 0.005;

            // Rotating green cube (independent rotation)
            cube.rotation.x += 0.01;
            cube.rotation.y += 0.015;
            cube.rotation.z += 0.005;

            innerCube.rotation.x -= 0.008;
            innerCube.rotation.y -= 0.012;
            innerCube.rotation.z += 0.003;

            // Floating cube movement
            cube.position.y = 5 + Math.sin(time) * 1.5;
            innerCube.position.y = cube.position.y;

            // Drifting blue particles
            const positions = particles.geometry.attributes.position.array;
            for (let i = 0; i < particleCount; i++) {
                positions[i * 3] += particleVelocities[i].x;
                positions[i * 3 + 1] += particleVelocities[i].y;
                positions[i * 3 + 2] += particleVelocities[i].z;

                // Boundary wrap-around
                if (positions[i * 3] > 40) positions[i * 3] = -40;
                if (positions[i * 3] < -40) positions[i * 3] = 40;
                if (positions[i * 3 + 1] > 30) positions[i * 3 + 1] = -30;
                if (positions[i * 3 + 1] < -30) positions[i * 3 + 1] = 30;
            }
            particles.geometry.attributes.position.needsUpdate = true;

            // Subtle star rotation
            stars.rotation.y += 0.0002;

            // Update controls
            controls.update();

            // Render
            renderer.render(scene, camera);
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start animation
        animate();

        // Console easter egg
        console.log('%c◈ Polygon Vision Activated ◈', 'color: #00ffff; font-size: 16px; font-family: monospace;');
        console.log('%cCyan Sphere: Pulsar', 'color: #00ffff; font-family: monospace;');
        console.log('%cGreen Cube: Prism', 'color: #44ff44; font-family: monospace;');
        console.log('%cBlue Dust: Drift', 'color: #4488ff; font-family: monospace;');
    </script>
</body>
</html>
