<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Airgapped Artifact - System Visualization</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000000;
      color: #333333;
      font-family: 'Segoe UI', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .artifact-container {
      position: relative;
      border: 1px solid #1a1a1a;
      border-radius: 4px;
      overflow: hidden;
    }
    canvas {
      display: block;
    }
    .info {
      position: absolute;
      bottom: 10px;
      left: 10px;
      font-size: 10px;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="artifact-container">
    <canvas id="artifact" width="800" height="600"></canvas>
    <div class="info">Airgapped • airgapped_1774172842323</div>
  </div>
  
  <script>
    const canvas = document.getElementById('artifact');
    const ctx = canvas.getContext('2d');
    
    // Background gradient
    const gradient = ctx.createLinearGradient(0, 0, 0, 600);
    gradient.addColorStop(0, '#000000');
    gradient.addColorStop(1, '#000000');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, 800, 600);
    
    // Memory gauge
    ctx.strokeStyle = '#333333';
    ctx.strokeRect(50, 50, 200, 20);
    ctx.fillStyle = '#4a4a4a';
    ctx.globalAlpha = 0.7;
    ctx.fillRect(50, 50, 12, 20);
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#333333';
    ctx.font = '12px monospace';
    ctx.fillText('MEM 6%', 260, 65);
    
    // Load sparklines
    const loads = [2.33, 1.87, 1.68];
    loads.forEach((load, i) => {
      const h = Math.min(load * 10, 30);
      ctx.fillStyle = '#000000';
      ctx.globalAlpha = 0.6;
      ctx.fillRect(50 + i * 70, 120 - h, 5, h);
    });
    ctx.globalAlpha = 1;
    ctx.font = '10px monospace';
    ctx.fillText('LOAD ' + loads.map(l => l.toFixed(2)).join(' '), 50, 140);
    
    // Threshold lines
    const thresholdCount = 8;
    for (let i = 0; i < thresholdCount; i++) {
      const t = i / (thresholdCount - 1);
      const y = 180 + t * 150;
      ctx.strokeStyle = '#333333';
      ctx.globalAlpha = 0.1 + (t * 0.3);
      ctx.lineWidth = 0.5 + t * 2;
      ctx.beginPath();
      ctx.moveTo(50, y);
      ctx.lineTo(750, y);
      ctx.stroke();
      
      // Markers
      ctx.globalAlpha = 0.3 + t * 0.4;
      ctx.fillStyle = ['#ffffff', '#aaaaaa', '#666666', '#333333', '#000000'][i % 5];
      ctx.beginPath();
      ctx.arc(100 + i * 75, y, 3 + t * 4, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    
    // Particles
    
    ctx.globalAlpha = 0.24;
    ctx.fillStyle = phases[0];
    ctx.beginPath();
    ctx.arc(598, 350, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.24;
    ctx.fillStyle = phases[1];
    ctx.beginPath();
    ctx.arc(622, 351, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.24;
    ctx.fillStyle = phases[2];
    ctx.beginPath();
    ctx.arc(646, 351, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.24;
    ctx.fillStyle = phases[3];
    ctx.beginPath();
    ctx.arc(670, 351, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.24;
    ctx.fillStyle = phases[4];
    ctx.beginPath();
    ctx.arc(694, 351, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.24;
    ctx.fillStyle = phases[0];
    ctx.beginPath();
    ctx.arc(117, 351, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.24;
    ctx.fillStyle = phases[1];
    ctx.beginPath();
    ctx.arc(141, 351, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.24;
    ctx.fillStyle = phases[2];
    ctx.beginPath();
    ctx.arc(165, 351, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.24;
    ctx.fillStyle = phases[3];
    ctx.beginPath();
    ctx.arc(189, 351, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.24;
    ctx.fillStyle = phases[4];
    ctx.beginPath();
    ctx.arc(213, 351, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.24;
    ctx.fillStyle = phases[0];
    ctx.beginPath();
    ctx.arc(237, 351, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.24;
    ctx.fillStyle = phases[1];
    ctx.beginPath();
    ctx.arc(261, 351, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.24;
    ctx.fillStyle = phases[2];
    ctx.beginPath();

    ctx.fillStyle = phases[2];
    ctx.beginPath();
    ctx.arc(644, 351, 2, 0, Math.PI * 2);
    ctx.fill();
    
    // Phase bar
    const barY = 550;
    const hourPhase = 0.375;
    const phases = ['#ffffff', '#aaaaaa', '#666666', '#333333', '#000000'];
    phases.forEach((color, i) => {
      const intensity = Math.abs(hourPhase - (i / 5));
      ctx.globalAlpha = 1 - intensity;
      ctx.fillStyle = color;
      ctx.fillRect(50 + i * 150, barY, 148, 15);
    });
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#333333';
    ctx.font = '9px monospace';
    ctx.fillText('AWAKENING • CALIBRATION • ENGAGEMENT • SYNTHESIS • COMPLETION', 50, barY + 35);
    
    // Git visualization
    
    ctx.strokeStyle = '#666666';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(50, 480);
    ctx.quadraticCurveTo(200, 460, 400, 480);
    ctx.stroke();
    ctx.fillStyle = '#4a4a4a';
    ctx.beginPath();
    ctx.arc(400, 480, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#333333';
    ctx.fillText('f7e43af', 420, 485);
    ctx.fillText('main *', 50, 485);
    
    
    // Title
    ctx.fillStyle = '#4a4a4a';
    ctx.font = '14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('AIRGAPPED ARTIFACT • System Telemetry Visualization', 400, 30);
    ctx.font = '8px monospace';
    ctx.fillStyle = '#1a1a1a';
    ctx.fillText('State-Independent Visualization • Graceful Degradation', 400, 590);
    ctx.textAlign = 'left';
  </script>
