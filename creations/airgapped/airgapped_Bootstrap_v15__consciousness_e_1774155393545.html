<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Airgapped Artifact - System Visualization</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      color: #e94560;
      font-family: 'Segoe UI', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .artifact-container {
      position: relative;
      border: 1px solid #16213e;
      border-radius: 4px;
      overflow: hidden;
    }
    canvas {
      display: block;
    }
    .info {
      position: absolute;
      bottom: 10px;
      left: 10px;
      font-size: 10px;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="artifact-container">
    <canvas id="artifact" width="800" height="600"></canvas>
    <div class="info">Airgapped • airgapped_1774155393545</div>
  </div>
  
  <script>
    const canvas = document.getElementById('artifact');
    const ctx = canvas.getContext('2d');
    
    // Background gradient
    const gradient = ctx.createLinearGradient(0, 0, 0, 600);
    gradient.addColorStop(0, '#1a1a2e');
    gradient.addColorStop(1, '#1a1a2e');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, 800, 600);
    
    // Memory gauge
    ctx.strokeStyle = '#e94560';
    ctx.strokeRect(50, 50, 200, 20);
    ctx.fillStyle = '#e94560';
    ctx.globalAlpha = 0.7;
    ctx.fillRect(50, 50, 12, 20);
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#e94560';
    ctx.font = '12px monospace';
    ctx.fillText('MEM 6%', 260, 65);
    
    // Load sparklines
    const loads = [1.09, 1.4, 1.83];
    loads.forEach((load, i) => {
      const h = Math.min(load * 10, 30);
      ctx.fillStyle = '#0f3460';
      ctx.globalAlpha = 0.6;
      ctx.fillRect(50 + i * 70, 120 - h, 5, h);
    });
    ctx.globalAlpha = 1;
    ctx.font = '10px monospace';
    ctx.fillText('LOAD ' + loads.map(l => l.toFixed(2)).join(' '), 50, 140);
    
    // Threshold lines
    const thresholdCount = 7;
    for (let i = 0; i < thresholdCount; i++) {
      const t = i / (thresholdCount - 1);
      const y = 180 + t * 150;
      ctx.strokeStyle = '#e94560';
      ctx.globalAlpha = 0.1 + (t * 0.3);
      ctx.lineWidth = 0.5 + t * 2;
      ctx.beginPath();
      ctx.moveTo(50, y);
      ctx.lineTo(750, y);
      ctx.stroke();
      
      // Markers
      ctx.globalAlpha = 0.3 + t * 0.4;
      ctx.fillStyle = ['#ffeaa7', '#e94560', '#fd79a8', '#16213e', '#1a1a2e'][i % 5];
      ctx.beginPath();
      ctx.arc(100 + i * 75, y, 3 + t * 4, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    
    // Particles
    
    ctx.globalAlpha = 0.24;
    ctx.fillStyle = phases[0];
    ctx.beginPath();
    ctx.arc(431, 351, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.24;
    ctx.fillStyle = phases[1];
    ctx.beginPath();
    ctx.arc(455, 351, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.24;
    ctx.fillStyle = phases[2];
    ctx.beginPath();
    ctx.arc(479, 351, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.24;
    ctx.fillStyle = phases[3];
    ctx.beginPath();
    ctx.arc(503, 351, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.24;
    ctx.fillStyle = phases[4];
    ctx.beginPath();
    ctx.arc(527, 351, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.24;
    ctx.fillStyle = phases[0];
    ctx.beginPath();
    ctx.arc(551, 351, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.24;
    ctx.fillStyle = phases[1];
    ctx.beginPath();
    ctx.arc(574, 351, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.24;
    ctx.fillStyle = phases[2];
    ctx.beginPath();
    ctx.arc(598, 351, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.24;
    ctx.fillStyle = phases[3];
    ctx.beginPath();
    ctx.arc(622, 351, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.24;
    ctx.fillStyle = phases[4];
    ctx.beginPath();
    ctx.arc(646, 351, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.24;
    ctx.fillStyle = phases[0];
    ctx.beginPath();
    ctx.arc(670, 351, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.24;
    ctx.fillStyle = phases[1];
    ctx.beginPath();
    ctx.arc(694, 351, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.24;
    ctx.fillStyle = phases[2];
    ctx.beginPath();
    ctx.arc(118, 351, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.24;
    ctx.fillStyle = phases[3];
    ctx.beginPath();
    ctx.arc(142, 351, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.24;
    ctx.fillStyle = phases[4];
    ctx.beginPath();
    ctx.arc(166, 351, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.24;
    ctx.fillStyle = phases[0];
    ctx.beginPath();
    ctx.arc(190, 351, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.24;
    ctx.fillStyle = phases[1];
    ctx.beginPath();
    ctx.arc(214, 351, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.24;
    ctx.fillStyle = phases[2];
    ctx.beginPath();
    ctx.arc(238, 351, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.24;
    ctx.fillStyle = phases[3];
    ctx.beginPath();
    ctx.arc(262, 351, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.24;
    ctx.fillStyle = phases[4];
    ctx.beginPath();
    ctx.arc(285, 351, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.24;
    ctx.fillStyle = phases[0];
    ctx.beginPath();
    ctx.arc(309, 351, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.24;
    ctx.fillStyle = phases[1];
    ctx.beginPath();
    ctx.arc(333, 351, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.24;
    ctx.fillStyle = phases[2];
    ctx.beginPath();
    ctx.arc(357, 351, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.24;
    ctx.fillStyle = phases[3];
    ctx.beginPath();
    ctx.arc(381, 351, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.24;
    ctx.fillStyle = phases[4];
    ctx.beginPath();
    ctx.arc(405, 351, 2, 0, Math.PI * 2);
    ctx.fill();
    
    // Phase bar
    const barY = 550;
    const hourPhase = 0.16666666666666666;
    const phases = ['#ffeaa7', '#e94560', '#fd79a8', '#16213e', '#1a1a2e'];
    phases.forEach((color, i) => {
      const intensity = Math.abs(hourPhase - (i / 5));
      ctx.globalAlpha = 1 - intensity;
      ctx.fillStyle = color;
      ctx.fillRect(50 + i * 150, barY, 148, 15);
    });
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#e94560';
    ctx.font = '9px monospace';
    ctx.fillText('AWAKENING • CALIBRATION • ENGAGEMENT • SYNTHESIS • COMPLETION', 50, barY + 35);
    
    // Git visualization
    
    ctx.strokeStyle = '#fd79a8';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(50, 480);
    ctx.quadraticCurveTo(200, 460, 400, 480);
    ctx.stroke();
    ctx.fillStyle = '#e94560';
    ctx.beginPath();
    ctx.arc(400, 480, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#e94560';
    ctx.fillText('6f567f1', 420, 485);
    ctx.fillText('main *', 50, 485);
    
    
    // Title
    ctx.fillStyle = '#e94560';
    ctx.font = '14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('AIRGAPPED ARTIFACT • System Telemetry Visualization', 400, 30);
    ctx.font = '8px monospace';
    ctx.fillStyle = '#16213e';
    ctx.fillText('State-Independent Visualization • Graceful Degradation', 400, 590);
    ctx.textAlign = 'left';
  </script>
</body>
</html>
