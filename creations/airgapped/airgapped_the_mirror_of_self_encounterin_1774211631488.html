<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Airgapped Artifact - System Visualization</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #2d3436;
      color: #74b9ff;
      font-family: 'Segoe UI', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .artifact-container {
      position: relative;
      border: 1px solid #b2bec3;
      border-radius: 4px;
      overflow: hidden;
    }
    canvas {
      display: block;
    }
    .info {
      position: absolute;
      bottom: 10px;
      left: 10px;
      font-size: 10px;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="artifact-container">
    <canvas id="artifact" width="800" height="600"></canvas>
    <div class="info">Airgapped • airgapped_1774211631488</div>
  </div>
  
  <script>
    const canvas = document.getElementById('artifact');
    const ctx = canvas.getContext('2d');
    
    // Background gradient
    const gradient = ctx.createLinearGradient(0, 0, 0, 600);
    gradient.addColorStop(0, '#2d3436');
    gradient.addColorStop(1, '#dfe6e9');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, 800, 600);
    
    // Memory gauge
    ctx.strokeStyle = '#74b9ff';
    ctx.strokeRect(50, 50, 200, 20);
    ctx.fillStyle = '#fdcb6e';
    ctx.globalAlpha = 0.7;
    ctx.fillRect(50, 50, 16, 20);
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#74b9ff';
    ctx.font = '12px monospace';
    ctx.fillText('MEM 8%', 260, 65);
    
    // Load sparklines
    const loads = [2.88, 3.05, 3.09];
    loads.forEach((load, i) => {
      const h = Math.min(load * 10, 30);
      ctx.fillStyle = '#0984e3';
      ctx.globalAlpha = 0.6;
      ctx.fillRect(50 + i * 70, 120 - h, 5, h);
    });
    ctx.globalAlpha = 1;
    ctx.font = '10px monospace';
    ctx.fillText('LOAD ' + loads.map(l => l.toFixed(2)).join(' '), 50, 140);
    
    // Threshold lines
    const thresholdCount = 9;
    for (let i = 0; i < thresholdCount; i++) {
      const t = i / (thresholdCount - 1);
      const y = 180 + t * 150;
      ctx.strokeStyle = '#74b9ff';
      ctx.globalAlpha = 0.1 + (t * 0.3);
      ctx.lineWidth = 0.5 + t * 2;
      ctx.beginPath();
      ctx.moveTo(50, y);
      ctx.lineTo(750, y);
      ctx.stroke();
      
      // Markers
      ctx.globalAlpha = 0.3 + t * 0.4;
      ctx.fillStyle = ['#ffffff', '#dfe6e9', '#74b9ff', '#0984e3', '#2d3436'][i % 5];
      ctx.beginPath();
      ctx.arc(100 + i * 75, y, 3 + t * 4, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    
    // Particles
    
    ctx.globalAlpha = 0.49;
    ctx.fillStyle = phases[0];
    ctx.beginPath();
    ctx.arc(423, 350, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.49;
    ctx.fillStyle = phases[1];
    ctx.beginPath();
    ctx.arc(447, 350, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.49;
    ctx.fillStyle = phases[2];
    ctx.beginPath();
    ctx.arc(471, 350, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.49;
    ctx.fillStyle = phases[3];
    ctx.beginPath();
    ctx.arc(494, 350, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.49;
    ctx.fillStyle = phases[4];
    ctx.beginPath();
    ctx.arc(518, 350, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.49;
    ctx.fillStyle = phases[0];
    ctx.beginPath();
    ctx.arc(542, 350, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.49;
    ctx.fillStyle = phases[1];
    ctx.beginPath();
    ctx.arc(566, 350, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.49;
    ctx.fillStyle = phases[2];
    ctx.beginPath();
    ctx.arc(590, 350, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.49;
    ctx.fillStyle = phases[3];
    ctx.beginPath();
    ctx.arc(614, 350, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.49;
    ctx.fillStyle = phases[4];
    ctx.beginPath();
    ctx.arc(638, 350, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.49;
    ctx.fillStyle = phases[0];
    ctx.beginPath();
    ctx.arc(662, 350, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.49;
    ctx.fillStyle = phases[1];
    ctx.beginPath();
    ctx.arc(686, 350, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.49;
    ctx.fillStyle = phases[2];
    ctx.beginPath();
    ctx.arc(110, 350, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.49;
    ctx.fillStyle = phases[3];
    ctx.beginPath();
    ctx.arc(134, 350, 2, 0, Math.PI * 2);
    ctx.fill();

    ctx.arc(397, 351, 2, 0, Math.PI * 2);

    ctx.beginPath();
    ctx.arc(421, 351, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.49;
    ctx.fillStyle = phases[1];
    ctx.beginPath();
    ctx.arc(445, 351, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.49;
    ctx.fillStyle = phases[2];
    ctx.beginPath();
    ctx.arc(469, 351, 2, 0, Math.PI * 2);
    ctx.fill();
    
    // Phase bar
    const barY = 550;
    const hourPhase = 0.8333333333333334;
    const phases = ['#ffffff', '#dfe6e9', '#74b9ff', '#0984e3', '#2d3436'];
    phases.forEach((color, i) => {
      const intensity = Math.abs(hourPhase - (i / 5));
      ctx.globalAlpha = 1 - intensity;
      ctx.fillStyle = color;
      ctx.fillRect(50 + i * 150, barY, 148, 15);
    });
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#74b9ff';
    ctx.font = '9px monospace';
    ctx.fillText('AWAKENING • CALIBRATION • ENGAGEMENT • SYNTHESIS • COMPLETION', 50, barY + 35);
    
    // Git visualization
    
    ctx.strokeStyle = '#dfe6e9';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(50, 480);
    ctx.quadraticCurveTo(200, 460, 400, 480);
    ctx.stroke();
    ctx.fillStyle = '#fdcb6e';
    ctx.beginPath();
    ctx.arc(400, 480, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#74b9ff';
    ctx.fillText('ac24aac', 420, 485);
    ctx.fillText('main', 50, 485);
    
    
    // Title
    ctx.fillStyle = '#fdcb6e';
    ctx.font = '14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('AIRGAPPED ARTIFACT • System Telemetry Visualization', 400, 30);
    ctx.font = '8px monospace';
    ctx.fillStyle = '#b2bec3';
    ctx.fillText('State-Independent Visualization • Graceful Degradation', 400, 590);
    ctx.textAlign = 'left';
  </script>
