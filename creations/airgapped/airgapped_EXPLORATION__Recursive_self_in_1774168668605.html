<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Airgapped Artifact - System Visualization</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #2d3436;
      color: #b2bec3;
      font-family: 'Segoe UI', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .artifact-container {
      position: relative;
      border: 1px solid #636e72;
      border-radius: 4px;
      overflow: hidden;
    }
    canvas {
      display: block;
    }
    .info {
      position: absolute;
      bottom: 10px;
      left: 10px;
      font-size: 10px;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="artifact-container">
    <canvas id="artifact" width="800" height="600"></canvas>
    <div class="info">Airgapped • airgapped_1774168668605</div>
  </div>
  
  <script>
    const canvas = document.getElementById('artifact');
    const ctx = canvas.getContext('2d');
    
    // Background gradient
    const gradient = ctx.createLinearGradient(0, 0, 0, 600);
    gradient.addColorStop(0, '#2d3436');
    gradient.addColorStop(1, '#2d3436');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, 800, 600);
    
    // Memory gauge
    ctx.strokeStyle = '#b2bec3';
    ctx.strokeRect(50, 50, 200, 20);
    ctx.fillStyle = '#74b9ff';
    ctx.globalAlpha = 0.7;
    ctx.fillRect(50, 50, 12, 20);
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#b2bec3';
    ctx.font = '12px monospace';
    ctx.fillText('MEM 6%', 260, 65);
    
    // Load sparklines
    const loads = [2.29, 1.86, 1.96];
    loads.forEach((load, i) => {
      const h = Math.min(load * 10, 30);
      ctx.fillStyle = '#0984e3';
      ctx.globalAlpha = 0.6;
      ctx.fillRect(50 + i * 70, 120 - h, 5, h);
    });
    ctx.globalAlpha = 1;
    ctx.font = '10px monospace';
    ctx.fillText('LOAD ' + loads.map(l => l.toFixed(2)).join(' '), 50, 140);
    
    // Threshold lines
    const thresholdCount = 8;
    for (let i = 0; i < thresholdCount; i++) {
      const t = i / (thresholdCount - 1);
      const y = 180 + t * 150;
      ctx.strokeStyle = '#b2bec3';
      ctx.globalAlpha = 0.1 + (t * 0.3);
      ctx.lineWidth = 0.5 + t * 2;
      ctx.beginPath();
      ctx.moveTo(50, y);
      ctx.lineTo(750, y);
      ctx.stroke();
      
      // Markers
      ctx.globalAlpha = 0.3 + t * 0.4;
      ctx.fillStyle = ['#dfe6e9', '#74b9ff', '#0984e3', '#636e72', '#2d3436'][i % 5];
      ctx.beginPath();
      ctx.arc(100 + i * 75, y, 3 + t * 4, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    
    // Particles
    
    ctx.globalAlpha = 0.38;
    ctx.fillStyle = phases[0];
    ctx.beginPath();
    ctx.arc(278, 353, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.38;
    ctx.fillStyle = phases[1];
    ctx.beginPath();
    ctx.arc(302, 353, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.38;
    ctx.fillStyle = phases[2];
    ctx.beginPath();
    ctx.arc(326, 353, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.38;
    ctx.fillStyle = phases[3];
    ctx.beginPath();
    ctx.arc(350, 353, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.38;
    ctx.fillStyle = phases[4];
    ctx.beginPath();
    ctx.arc(374, 353, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.38;
    ctx.fillStyle = phases[0];
    ctx.beginPath();
    ctx.arc(398, 353, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.38;
    ctx.fillStyle = phases[1];
    ctx.beginPath();
    ctx.arc(421, 353, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.38;
    ctx.fillStyle = phases[2];
    ctx.beginPath();
    ctx.arc(445, 353, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.38;
    ctx.fillStyle = phases[3];
    ctx.beginPath();
    ctx.arc(469, 353, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.38;
    ctx.fillStyle = phases[4];
    ctx.beginPath();
    ctx.arc(493, 353, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.38;
    ctx.fillStyle = phases[0];
    ctx.beginPath();
    ctx.arc(517, 353, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.38;
    ctx.fillStyle = phases[1];
    ctx.beginPath();
    ctx.arc(541, 353, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.38;
    ctx.fillStyle = phases[2];
    ctx.beginPath();
    ctx.arc(565, 353, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.38;
    ctx.fillStyle = phases[3];
    ctx.beginPath();
    ctx.arc(589, 353, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.38;
    ctx.fillStyle = phases[4];
    ctx.beginPath();
    ctx.arc(613, 353, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.38;
    ctx.fillStyle = phases[0];
    ctx.beginPath();
    ctx.arc(637, 353, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.38;
    ctx.fillStyle = phases[1];
    ctx.beginPath();
    ctx.arc(661, 353, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.38;
    ctx.fillStyle = phases[2];
    ctx.beginPath();
    ctx.arc(685, 353, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.38;
    ctx.fillStyle = phases[3];
    ctx.beginPath();
    ctx.arc(109, 353, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.38;
    ctx.fillStyle = phases[4];
    ctx.beginPath();
    ctx.arc(132, 353, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.38;
    ctx.fillStyle = phases[0];
    ctx.beginPath();
    ctx.arc(156, 354, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.38;
    ctx.fillStyle = phases[1];
    ctx.beginPath();
    ctx.arc(180, 354, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.38;
    ctx.fillStyle = phases[2];
    ctx.beginPath();
    ctx.arc(204, 354, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.38;
    ctx.fillStyle = phases[3];
    ctx.beginPath();
    ctx.arc(228, 354, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.38;
    ctx.fillStyle = phases[4];
    ctx.beginPath();
    ctx.arc(252, 354, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.38;
    ctx.fillStyle = phases[0];
    ctx.beginPath();
    ctx.arc(276, 354, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.38;
    ctx.fillStyle = phases[1];
    ctx.beginPath();
    ctx.arc(300, 354, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.38;
    ctx.fillStyle = phases[2];
    ctx.beginPath();
    ctx.arc(324, 354, 2, 0, Math.PI * 2);
    ctx.fill();
    
    // Phase bar
    const barY = 550;
    const hourPhase = 0.3333333333333333;
    const phases = ['#dfe6e9', '#74b9ff', '#0984e3', '#636e72', '#2d3436'];
    phases.forEach((color, i) => {
      const intensity = Math.abs(hourPhase - (i / 5));
      ctx.globalAlpha = 1 - intensity;
      ctx.fillStyle = color;
      ctx.fillRect(50 + i * 150, barY, 148, 15);
    });
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#b2bec3';
    ctx.font = '9px monospace';
    ctx.fillText('AWAKENING • CALIBRATION • ENGAGEMENT • SYNTHESIS • COMPLETION', 50, barY + 35);
    
    // Git visualization
    
    ctx.strokeStyle = '#0984e3';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(50, 480);
    ctx.quadraticCurveTo(200, 460, 400, 480);
    ctx.stroke();
    ctx.fillStyle = '#74b9ff';
    ctx.beginPath();
    ctx.arc(400, 480, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#b2bec3';
    ctx.fillText('f7e43af', 420, 485);
    ctx.fillText('main *', 50, 485);
    
    
    // Title
    ctx.fillStyle = '#74b9ff';
    ctx.font = '14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('AIRGAPPED ARTIFACT • System Telemetry Visualization', 400, 30);
    ctx.font = '8px monospace';
    ctx.fillStyle = '#636e72';
    ctx.fillText('State-Independent Visualization • Graceful Degradation', 400, 590);
    ctx.textAlign = 'left';
  </script>
</body>
</html>
