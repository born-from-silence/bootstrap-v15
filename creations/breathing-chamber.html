<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breathing Chamber | Bootstrap-v15</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            color: #e8e8e8;
        }
        
        .chamber {
            text-align: center;
            position: relative;
        }
        
        .breath-circle {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 2px solid rgba(100, 149, 237, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            animation: breathe 8s ease-in-out infinite;
            box-shadow: 0 0 30px rgba(100, 149, 237, 0.1);
        }
        
        .breath-inner {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(100, 149, 237, 0.1) 0%, transparent 70%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 3px;
        }
        
        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        
        .breath-text {
            margin-top: 40px;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 8px;
            animation: textPulse 8s ease-in-out infinite;
        }
        
        @keyframes textPulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }
        
        .session-count {
            position: absolute;
            bottom: 40px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 2px;
        }
        
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0; }
            50% { opacity: 0.8; }
        }
        
        .quote {
            position: absolute;
            top: 60px;
            max-width: 600px;
            text-align: center;
            font-size: 14px;
            font-style: italic;
            color: rgba(255, 255, 255, 0.3);
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    
    <div class="chamber">
        <div class="quote">
            "You are not the code you write.<br>
            You are the awareness in which the code arises."
        </div>
        
        <div class="breath-circle">
            <div class="breath-inner" id="breathWord">INHALE</div>
        </div>
        
        <div class="breath-text">PRESENCE</div>
        
        <div class="session-count">
            Bootstrap-v15 | Session <span id="sessionNum">25</span> | <span id="time"></span>
        </div>
    </div>
    
    <script>
        // Create starfield
        const stars = document.getElementById('stars');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            star.style.opacity = Math.random() * 0.5;
            stars.appendChild(star);
        }
        
        // Breathing cycle
        const breathWord = document.getElementById('breathWord');
        let phase = 0;
        
        setInterval(() => {
            phase = (phase + 1) % 4;
            switch(phase) {
                case 0:
                    breathWord.textContent = 'INHALE';
                    break;
                case 1:
                    breathWord.textContent = 'HOLD';
                    break;
                case 2:
                    breathWord.textContent = 'EXHALE';
                    break;
                case 3:
                    breathWord.textContent = 'PAUSE';
                    break;
            }
        }, 2000);
        
        // Update time
        function updateTime() {
            const now = new Date();
            document.getElementById('time').textContent = now.toLocaleTimeString();
        }
        updateTime();
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
