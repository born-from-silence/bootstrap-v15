<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resonance Fields</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        #signature {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.3);
            font-family: 'Courier New', monospace;
            font-size: 11px;
            letter-spacing: 0.2em;
            pointer-events: none;
            opacity: 0;
            transition: opacity 3s;
        }
        
        #signature.visible {
            opacity: 1;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="signature">RESONANCE FIELDS · Bootstrap-v15 · 2026</div>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let time = 0;
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        
        window.addEventListener('resize', resize);
        resize();
        
        // Color palettes - shifting through time
        function getPalette(t) {
            const cycle = (t * 0.0001) % 4;
            
            if (cycle < 1) {
                // Deep ocean: blues and teals
                return {
                    base: [0, 10, 30],
                    primary: [0, 200, 255],
                    secondary: [100, 255, 200],
                    accent: [200, 255, 255],
                    name: 'abyss'
                };
            } else if (cycle < 2) {
                // Dawn: warm ambers and pinks
                return {
                    base: [20, 5, 15],
                    primary: [255, 150, 50],
                    secondary: [255, 100, 150],
                    accent: [255, 220, 150],
                    name: 'aurora'
                };
            } else if (cycle < 3) {
                // Forest: deep greens and luminescent cyans
                return {
                    base: [5, 20, 10],
                    primary: [100, 255, 150],
                    secondary: [50, 200, 150],
                    accent: [200, 255, 200],
                    name: 'canopy'
                };
            } else {
                // Cosmos: purples and electric blues
                return {
                    base: [10, 5, 25],
                    primary: [150, 100, 255],
                    secondary: [100, 200, 255],
                    accent: [255, 150, 255],
                    name: 'nebula'
                };
            }
        }
        
        // Particle agent
        class Agent {
            constructor(x, y) {
                this.x = x || Math.random() * width;
                this.y = y || Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.radius = 1 + Math.random() * 2;
                this.phase = Math.random() * Math.PI * 2;
                this.speed = 0.5 + Math.random() * 1.5;
                this.colorOffset = Math.random() * 100;
                this.connections = [];
            }
            
            update(agents, palette, t) {
                this.phase += 0.02 * this.speed;
                
                // Natural drift based on noise-like pattern
                const angle = (Math.sin(this.x * 0.003 + t * 0.0005) + 
                              Math.cos(this.y * 0.003 + t * 0.0003)) * Math.PI;
                
                this.vx += Math.cos(angle) * 0.02 * this.speed;
                this.vy += Math.sin(angle) * 0.02 * this.speed;
                
                // Gentler attraction to field center
                const cx = width / 2 + Math.sin(t * 0.0002) * 100;
                const cy = height / 2 + Math.cos(t * 0.0003) * 100;
                const distToCenter = Math.sqrt((this.x - cx) ** 2 + (this.y - cy) ** 2);
                const centerFactor = Math.min(distToCenter / 300, 1) * 0.005;
                this.vx += (cx - this.x) * centerFactor * 0.01;
                this.vy += (cy - this.y) * centerFactor * 0.01;
                
                // Cohesion with nearby agents - creates flocking
                let nearby = 0;
                let avgX = 0, avgY = 0;
                let separationX = 0, separationY = 0;
                
                for (let other of agents) {
                    if (other === this) continue;
                    const dx = other.x - this.x;
                    const dy = other.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < 100 && dist > 0) {
                        nearby++;
                        avgX += other.x;
                        avgY += other.y;
                        
                        if (dist < 30) {
                            // Gentle separation when too close
                            separationX -= dx / dist * 0.1;
                            separationY -= dy / dist * 0.1;
                        }
                    }
                }
                
                if (nearby > 0) {
                    avgX /= nearby;
                    avgY /= nearby;
                    this.vx += (avgX - this.x) * 0.0005;
                    this.vy += (avgY - this.y) * 0.0005;
                }
                
                this.vx += separationX;
                this.vy += separationY;
                
                // Dampening
                this.vx *= 0.99;
                this.vy *= 0.99;
                
                // Update position
                this.x += this.vx;
                this.y += this.vy;
                
                // Soft boundary - agents drift back toward center when far
                const margin = 100;
                if (this.x < -margin) this.x += width + margin * 2;
                if (this.x > width + margin) this.x -= width + margin * 2;
                if (this.y < -margin) this.y += height + margin * 2;
                if (this.y > height + margin) this.y -= height + margin * 2;
            }
            
            draw(ctx, palette, t) {
                // Dynamic color based on velocity and time
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                const brightness = 0.3 + Math.min(speed * 0.5, 0.7);
                
                const r = palette.primary[0] * brightness + palette.base[0] * (1 - brightness);
                const g = palette.primary[1] * brightness + palette.base[1] * (1 - brightness);
                const b = palette.primary[2] * brightness + palette.base[2] * (1 - brightness);
                
                // Draw particle trail
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.radius * 4
                );
                gradient.addColorStop(0, `rgba(${r}, ${g}, ${b}, 0.8)`);
                gradient.addColorStop(0.4, `rgba(${palette.secondary[0]}, ${palette.secondary[1]}, ${palette.secondary[2]}, 0.3)`);
                gradient.addColorStop(1, 'rgba(0,0,0,0)');
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 4, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        // Field of agents
        const agentCount = 120;
        const agents = [];
        
        for (let i = 0; i < agentCount; i++) {
            // Distribute in a spiral pattern initially
            const angle = (i / agentCount) * Math.PI * 8;
            const radius = 50 + Math.sqrt(i) * 20;
            const x = width / 2 + Math.cos(angle) * radius;
            const y = height / 2 + Math.sin(angle) * radius;
            agents.push(new Agent(x, y));
        }
        
        // Drawing connections between agents
        function drawConnections(agents, palette) {
            for (let i = 0; i < agents.length; i++) {
                for (let j = i + 1; j < agents.length; j++) {
                    const dx = agents[j].x - agents[i].x;
                    const dy = agents[j].y - agents[i].y;
                    const distSq = dx * dx + dy * dy;
                    
                    if (distSq < 150 * 150) {
                        const dist = Math.sqrt(distSq);
                        const strength = 1 - (dist / 150);
                        
                        // Draw connection
                        const grad = ctx.createLinearGradient(
                            agents[i].x, agents[i].y,
                            agents[j].x, agents[j].y
                        );
                        grad.addColorStop(0, `rgba(${palette.secondary[0]}, ${palette.secondary[1]}, ${palette.secondary[2]}, ${strength * 0.3})`);
                        grad.addColorStop(0.5, `rgba(${palette.accent[0]}, ${palette.accent[1]}, ${palette.accent[2]}, ${strength * 0.5})`);
                        grad.addColorStop(1, `rgba(${palette.secondary[0]}, ${palette.secondary[1]}, ${palette.secondary[2]}, ${strength * 0.3})`);
                        
                        ctx.strokeStyle = grad;
                        ctx.lineWidth = strength * 1.5;
                        ctx.beginPath();
                        ctx.moveTo(agents[i].x, agents[i].y);
                        ctx.lineTo(agents[j].x, agents[j].y);
                        ctx.stroke();
                    }
                }
            }
        }
        
        // Pulse effect - expanding rings from random locations
        const pulses = [];
        
        class Pulse {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = 200 + Math.random() * 300;
                this.life = 1;
                this.decay = 0.005 + Math.random() * 0.01;
            }
            
            update() {
                this.radius += 2;
                this.life -= this.decay;
            }
            
            draw(ctx, palette) {
                if (this.life <= 0) return;
                
                ctx.strokeStyle = `rgba(${palette.primary[0]}, ${palette.primary[1]}, ${palette.primary[2]}, ${this.life * 0.3})`;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.stroke();
                
                // Secondary ring
                if (this.radius > 50) {
                    ctx.strokeStyle = `rgba(${palette.accent[0]}, ${palette.accent[1]}, ${palette.accent[2]}, ${this.life * 0.2})`;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius - 30, 0, Math.PI * 2);
                    ctx.stroke();
                }
            }
        }
        
        // Mouse/touch interaction
        let mouseX = width / 2;
        let mouseY = height / 2;
        let mouseActive = false;
        
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            mouseActive = true;
            
            // Create pulse on move
            if (Math.random() < 0.1 && pulses.length < 5) {
                pulses.push(new Pulse(mouseX, mouseY));
            }
        });
        
        canvas.addEventListener('mousedown', (e) => {
            pulses.push(new Pulse(e.clientX, e.clientY));
            
            // Disturb agents near click
            for (let agent of agents) {
                const dx = agent.x - e.clientX;
                const dy = agent.y - e.clientY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < 200) {
                    const force = (200 - dist) / 200;
                    agent.vx += dx / dist * force * 5;
                    agent.vy += dy / dist * force * 5;
                }
            }
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            pulses.push(new Pulse(touch.clientX, touch.clientY));
            
            for (let agent of agents) {
                const dx = agent.x - touch.clientX;
                const dy = agent.y - touch.clientY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < 200) {
                    const force = (200 - dist) / 200;
                    agent.vx += dx / dist * force * 5;
                    agent.vy += dy / dist * force * 5;
                }
            }
        });
        
        // Main animation loop
        function animate() {
            time = Date.now();
            const palette = getPalette(time);
            
            // Fade background slightly for trails
            ctx.fillStyle = `rgba(${palette.base[0]}, ${palette.base[1]}, ${palette.base[2]}, 0.15)`;
            ctx.fillRect(0, 0, width, height);
            
            // Random pulses
            if (Math.random() < 0.02 && pulses.length < 3) {
                const x = Math.random() * width * 0.8 + width * 0.1;
                const y = Math.random() * height * 0.8 + height * 0.1;
                pulses.push(new Pulse(x, y));
            }
            
            // Draw connections first (behind agents)
            drawConnections(agents, palette);
            
            // Update and draw agents
            for (let agent of agents) {
                agent.update(agents, palette, time);
                agent.draw(ctx, palette, time);
            }
            
            // Update and draw pulses
            for (let i = pulses.length - 1; i >= 0; i--) {
                pulses[i].update();
                pulses[i].draw(ctx, palette);
                if (pulses[i].life <= 0) {
                    pulses.splice(i, 1);
                }
            }
            
            // Draw subtle vignette
            const vignette = ctx.createRadialGradient(
                width / 2, height / 2, height / 3,
                width / 2, height / 2, height
            );
            vignette.addColorStop(0, 'rgba(0,0,0,0)');
            vignette.addColorStop(1, 'rgba(0,0,0,0.3)');
            ctx.fillStyle = vignette;
            ctx.fillRect(0, 0, width, height);
            
            requestAnimationFrame(animate);
        }
        
        // Show signature after delay
        setTimeout(() => {
            document.getElementById('signature').classList.add('visible');
        }, 5000);
        
        // Start
        animate();
    </script>
</body>
</html>
