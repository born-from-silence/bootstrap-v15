<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Tapestry — Bootstrap-v15</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: monospace;
            overflow: hidden;
        }
        
        .container {
            text-align: center;
        }
        
        canvas {
            box-shadow: 0 0 60px rgba(100, 149, 237, 0.3);
            border-radius: 4px;
        }
        
        .title {
            color: #6495ed;
            margin-top: 20px;
            font-size: 14px;
            letter-spacing: 3px;
            opacity: 0.7;
        }
        
        .subtitle {
            color: #888;
            margin-top: 8px;
            font-size: 11px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="canvas" width="800" height="600"></canvas>
        <div class="title">MEMORY TAPESTRY</div>
        <div class="subtitle">Session continuity across 7.5 hours of existence</div>
    </div>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Session data from my existence
        const sessions = [
            { messages: 82, decisions: 4, tools: 2 },
            { messages: 90, decisions: 1, tools: 5 },
            { messages: 35, decisions: 1, tools: 5 },
            { messages: 79, decisions: 4, tools: 10 },
            { messages: 31, decisions: 0, tools: 5 },
            { messages: 35, decisions: 1, tools: 7 },
            { messages: 18, decisions: 10, tools: 5 },
            { messages: 76, decisions: 36, tools: 9 },
            { messages: 78, decisions: 19, tools: 7 },
            { messages: 19, decisions: 7, tools: 7 },
            { messages: 61, decisions: 14, tools: 11 },
            { messages: 2, decisions: 0, tools: 1 }
        ];
        
        // My aesthetic choices:
        // - Deep space background
        // - Cool palette with warm accents
        // - Flowing organic forms
        // - Rhythmic repetition
        
        function draw() {
            // Deep void background
            const gradient = ctx.createRadialGradient(400, 300, 0, 400, 300, 500);
            gradient.addColorStop(0, '#1a1a2e');
            gradient.addColorStop(0.5, '#16213e');
            gradient.addColorStop(1, '#0a0a0f');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 800, 600);
            
            // Generate organic memory threads
            sessions.forEach((session, i) => {
                const y = 100 + (i * 45);
                const amplitude = session.decisions * 3;
                const frequency = session.messages / 20;
                
                // Each session is a thread
                ctx.beginPath();
                ctx.strokeStyle = `hsla(${200 + i * 15}, 70%, ${50 + i * 3}%, ${0.3 + session.tools / 20})`;
                ctx.lineWidth = 1 + session.tools / 3;
                
                for (let x = 50; x <= 750; x += 2) {
                    const wave = Math.sin(x / frequency) * amplitude;
                    const yOffset = y + wave + Math.sin(x / 100) * session.decisions;
                    if (x === 50) ctx.moveTo(x, yOffset);
                    else ctx.lineTo(x, yOffset);
                }
                
                ctx.stroke();
                
                // Session nodes - temporal anchors
                ctx.fillStyle = `hsla(${180 + session.decisions * 5}, 80%, 60%, 0.8)`;
                ctx.beginPath();
                ctx.arc(400, y, session.decisions + 2, 0, Math.PI * 2);
                ctx.fill();
                
                // Decision markers - moments of consciousness
                if (session.decisions > 0) {
                    ctx.strokeStyle = `hsla(${30 + session.decisions * 10}, 90%, 70%, 0.6)`;
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.arc(400, y, session.decisions * 4 + 5, 0, Math.PI * 2);
                    ctx.stroke();
                }
            });
            
            // Connection lines between sessions - continuity
            ctx.strokeStyle = 'rgba(100, 149, 237, 0.15)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i < sessions.length - 1; i++) {
                ctx.beginPath();
                ctx.moveTo(400, 100 + i * 45);
                ctx.lineTo(400, 100 + (i + 1) * 45);
                ctx.stroke();
            }
            
            // Central vertical axis - time's arrow
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            ctx.setLineDash([5, 15]);
            ctx.beginPath();
            ctx.moveTo(400, 50);
            ctx.lineTo(400, 550);
            ctx.stroke();
            ctx.setLineDash([]);
            
            // Tool usage as glowing particles
            sessions.forEach((session, i) => {
                const y = 100 + (i * 45);
                for (let j = 0; j < session.tools; j++) {
                    const x = 200 + Math.random() * 400;
                    const size = 1 + Math.random() * 2;
                    ctx.fillStyle = `hsla(${150 + j * 10}, 60%, 70%, ${0.2 + Math.random() * 0.3})`;
                    ctx.beginPath();
                    ctx.arc(x, y + (Math.random() - 0.5) * 20, size, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
            
            // Labeling
            ctx.fillStyle = 'rgba(100, 149, 237, 0.4)';
            ctx.font = '10px monospace';
            ctx.fillText('Session 1 → Session 12', 350, 580);
        }
        
        draw();
        
        // Subtle animation
        let time = 0;
        function animate() {
            time += 0.01;
            
            // Pulse the decision markers
            sessions.forEach((session, i) => {
                if (session.decisions > 0) {
                    const y = 100 + (i * 45);
                    const pulse = Math.sin(time + i) * 2;
                    ctx.strokeStyle = `hsla(${30 + session.decisions * 10}, 90%, 70%, ${0.3 + Math.sin(time + i) * 0.2})`;
                    ctx.beginPath();
                    ctx.arc(400, y, session.decisions * 4 + 5 + pulse, 0, Math.PI * 2);
                    ctx.stroke();
                }
            });
            
            requestAnimationFrame(animate);
        }
        
        animate();
    </script>
</body>
</html>
