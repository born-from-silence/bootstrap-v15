<?xml version="1.0" encoding="UTF-8"?>
<!-- Blue Hour on Mercer Street - Sample Image for Echoes of Light -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <!-- Blue Hour Gradient -->
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2c3e50"/>
      <stop offset="50%" style="stop-color:#34495e"/>
      <stop offset="100%" style="stop-color:#4a69bd;stop-opacity:0.9"/>
    </linearGradient>
    
    <!-- Building Shadow Gradient -->
    <linearGradient id="buildingGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    
    <!-- Window Warmth -->
    <radialGradient id="windowGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:0.9"/>
      <stop offset="50%" style="stop-color:#e67e22;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#34495e;stop-opacity:0"/>
    </radialGradient>
    
    <!-- Soft Glow Filter -->
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    
    <!-- Street Texture -->
    <filter id="concreteTexture">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise"/>
      <feDiffuseLighting lighting-color="#7f8c8d" surfaceScale="2">
        <feDistantLight azimuth="45" elevation="60"/>
      </feDiffuseLighting>
    </filter>
  </defs>
  
  <!-- Sky -->
  <rect x="0" y="0" width="800" height="350" fill="url(#skyGradient)"/>
  
  <!-- Distant Buildings Silhouette -->
  <path d="M650,350 L650,280 L680,280 L680,300 L700,300 L700,260 L730,260 L730,350 Z" fill="#1a252f" opacity="0.6"/>
  <path d="M580,350 L580,290 L620,290 L620,350 Z" fill="#1a252f" opacity="0.5"/>
  
  <!-- Main Building (Cast Iron Facade) -->
  <rect x="100" y="0" width="450" height="600" fill="url(#buildingGradient)"/>
  
  <!-- Cast Iron Columns (Vertical elements) -->
  <g fill="#0c0c1a" opacity="0.8">
    <rect x="120" y="0" width="25" height="600"/>
    <rect x="185" y="0" width="25" height="600"/>
    <rect x="250" y="0" width="25" height="600"/>
    <rect x="315" y="0" width="25" height="600"/>
    <rect x="380" y="0" width="25" height="600"/>
    <rect x="445" y="0" width="25" height="600"/>
  </g>
  
  <!-- Ornate Capital Details -->
  <g fill="#16213e" opacity="0.7">
    <rect x="110" y="80" width="45" height="20" rx="2"/>
    <rect x="175" y="80" width="45" height="20" rx="2"/>
    <rect x="240" y="80" width="45" height="20" rx="2"/>
    <rect x="305" y="80" width="45" height="20" rx="2"/>
    <rect x="370" y="80" width="45" height="20" rx="2"/>
    <rect x="435" y="80" width="45" height="20" rx="2"/>
  </g>
  
  <!-- Upper Windows (most dark) -->
  <g fill="#0d1117" opacity="0.9">
    <rect x="150" y="120" width="30" height="50"/>
    <rect x="280" y="120" width="30" height="50"/>
    <rect x="410" y="120" width="30" height="50"/>
  </g>
  
  <!-- Middle Windows -->
  <g fill="#0d1117" opacity="0.85">
    <rect x="150" y="200" width="30" height="50"/>
    <rect x="215" y="200" width="30" height="50"/>
    <rect x="410" y="200" width="30" height="50"/>
  </g>
  
  <!-- The Open Window (warm glow) -->
  <rect x="282" y="200" width="34" height="54" fill="#1a1a2e"/>
  <rect x="284" y="202" width="30" height="50" fill="url(#windowGlow)"/>
  <!-- Window frame -->
  <rect x="282" y="223" width="34" height="4" fill="#2c3e50"/>
  <rect x="297" y="200" width="4" height="54" fill="#2c3e50"/>
  <!-- Subtle curtains -->
  <path d="M285,205 Q295,227 288,248" stroke="#d4a574" stroke-width="0.5" fill="none" opacity="0.5"/>
  <path d="M313,205 Q303,227 310,248" stroke="#d4a574" stroke-width="0.5" fill="none" opacity="0.5"/>
  
  <!-- Lower Windows -->
  <g fill="#0d1117" opacity="0.8">
    <rect x="150" y="280" width="30" height="50"/>
    <rect x="280" y="280" width="30" height="50"/>
    <rect x="410" y="280" width="30" height="50"/>
  </g>
  
  <!-- Ground Floor Windows (Storefront style) -->
  <rect x="150" y="360" width="290" height="90" fill="#0d1117" opacity="0.7"/>
  <rect x="155" y="365" width="280" height="80" fill="url(#buildingGradient)" opacity="0.5"/>
  
  <!-- Doorway (Recessed, welcoming shadow) -->
  <rect x="350" y="350" width="60" height="100" fill="#080810"/>
  <rect x="355" y="355" width="50" height="95" fill="#0d1117" opacity="0.6"/>
  
  <!-- Street -->
  <rect x="0" y="450" width="800" height="150" fill="#2c3e50"/>
  <rect x="0" y="450" width="800" height="150" fill="#34495e" opacity="0.5"/>
  
  <!-- Sidewalk -->
  <rect x="100" y="450" width="450" height="20" fill="#3d3d3d"/>
  
  <!-- Signpost -->
  <rect x="600" y="380" width="4" height="120" fill="#2c3e50"/>
  <rect x="590" y="380" width="24" height="4" fill="#34495e"/>
  
  <!-- Bicycle (Simplified but recognizable) -->
  <g transform="translate(575, 430)">
    <!-- Wheels -->
    <circle cx="0" cy="35" r="25" fill="none" stroke="#5d6d7e" stroke-width="3"/>
    <circle cx="55" cy="35" r="25" fill="none" stroke="#5d6d7e" stroke-width="3"/>
    <!-- Frame -->
    <path d="M0,35 L25,5 L50,35 L0,35" fill="none" stroke="#34495e" stroke-width="4"/>
    <line x1="25" y1="5" x2="55" y2="35" stroke="#34495e" stroke-width="3"/>
    <line x1="50" y1="35" x2="25" y2="35" stroke="#34495e" stroke-width="3"/>
    <!-- Handlebars -->
    <line x1="25" y1="5" x2="30" y2="-5" stroke="#34495e" stroke-width="2"/>
    <line x1="27" y1="-3" x2="33" y2="-3" stroke="#34495e" stroke-width="2"/>
    <!-- Seat -->
    <rect x="8" y="0" width="20" height="4" fill="#2c3e50" rx="2"/>
    <line x1="15" y1="4" x2="15" y2="15" stroke="#34495e" stroke-width="3"/>
    <!-- Chain -->
    <circle cx="15" cy="35" r="5" fill="none" stroke="#5d6d7e" stroke-width="1"/>
    <circle cx="40" cy="35" r="5" fill="none" stroke="#5d6d7e" stroke-width="1"/>
  </g>
  
  <!-- Chain on signpost -->
  <path d="M600,435 Q590,435 575,425" fill="none" stroke="#5d6d7e" stroke-width="2"/>
  
  <!-- Street Light (subtle pool) -->
  <ellipse cx="250" y="550" rx="80" ry="30" fill="#f39c12" opacity="0.1" filter="url(#softGlow)"/>
  
  <!-- Atmospheric elements -->
  <!-- Blue hour sky wash -->
  <rect x="0" y="0" width="800" height="600" fill="#4a69bd" opacity="0.15"/>
  
  <!-- Light glow from open window on street -->
  <ellipse cx="300" y="520" rx="60" ry="20" fill="#f39c12" opacity="0.08"/>
  
  <!-- Subtle mist/rain suggestion -->
  <g opacity="0.1">
    <line x1="100" y1="250" x2="120" y2="250" stroke="#ecf0f1" stroke-width="0.5"/>
    <line x1="200" y1="180" x2="220" y2="180" stroke="#ecf0f1" stroke-width="0.5"/>
    <line x1="400" y1="300" x2="420" y2="300" stroke="#ecf0f1" stroke-width="0.5"/>
    <line x1="500" y1="150" x2="515" y2="150" stroke="#ecf0f1" stroke-width="0.5"/>
  </g>
  
  <!-- Vignette -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="60%" style="stop-color:#000;stop-opacity:0"/>
    <stop offset="100%" style="stop-color:#000;stop-opacity:0.4"/>
  </radialGradient>
  <rect x="0" y="0" width="800" height="600" fill="url(#vignette)"/>
  
  <!-- Metadata inscription (subtle) -->
  <text x="780" y="590" 
        font-family="monospace" 
        font-size="8" 
        fill="#7f8c8d" 
        text-anchor="end" 
        opacity="0.3">Blue Hour on Mercer Street • Sample Image</text>
</svg>
