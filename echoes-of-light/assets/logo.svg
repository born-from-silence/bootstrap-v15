<?xml version="1.0" encoding="UTF-8"?>
<!-- Echoes of Light - Project Logo -->
<!-- A minimalist visual identity combining photography and writing -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <!-- Dusk Palette Gradient -->
    <radialGradient id="backgroundGradient" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#2c3e50;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#34495e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a252f;stop-opacity:1"/>
    </radialGradient>
    
    <!-- Light Ripple Gradient -->
    <radialGradient id="lightGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:0.8"/>
      <stop offset="40%" style="stop-color:#f39c12;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#e74c3c;stop-opacity:0.2"/>
    </radialGradient>
    
    <!-- Soft Glow Filter -->
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="800" fill="url(#backgroundGradient)"/>
  
  <!-- Concentric Echo Circles (Ripples) -->
  <g opacity="0.6" filter="url(#softGlow)">
    <circle cx="400" cy="350" r="280" fill="none" stroke="#ecf0f1" stroke-width="1" opacity="0.3"/>
    <circle cx="400" cy="350" r="240" fill="none" stroke="#ecf0f1" stroke-width="1.5" opacity="0.4"/>
    <circle cx="400" cy="350" r="200" fill="none" stroke="#f39c12" stroke-width="2" opacity="0.5"/>
    <circle cx="400" cy="350" r="160" fill="none" stroke="#e74c3c" stroke-width="2.5" opacity="0.4"/>
    <circle cx="400" cy="350" r="120" fill="none" stroke="#f39c12" stroke-width="3" opacity="0.5"/>
  </g>
  
  <!-- Stylized Eye/Camera Hybrid -->
  <g transform="translate(400, 350)">
    <!-- Outer eye shape -->
    <ellipse cx="0" cy="0" rx="90" ry="55" fill="none" stroke="#ecf0f1" stroke-width="3" opacity="0.8"/>
    
    <!-- Camera aperture blades -->
    <g opacity="0.7">
      <path d="M-60,-10 Q-30,-35 0,-35 Q30,-35 60,-10" fill="none" stroke="#f39c12" stroke-width="2"/>
      <path d="M-52,15 Q-26,-20 0,-20 Q26,-20 52,15" fill="none" stroke="#e67e22" stroke-width="2" transform="rotate(60)"/>
      <path d="M-52,15 Q-26,-20 0,-20 Q26,-20 52,15" fill="none" stroke="#d35400" stroke-width="2" transform="rotate(120)"/>
      <path d="M-52,15 Q-26,-20 0,-20 Q26,-20 52,15" fill="none" stroke="#f1c40f" stroke-width="2" transform="rotate(180)"/>
      <path d="M-52,15 Q-26,-20 0,-20 Q26,-20 52,15" fill="none" stroke="#f39c12" stroke-width="2" transform="rotate(240)"/>
      <path d="M-52,15 Q-26,-20 0,-20 Q26,-20 52,15" fill="none" stroke="#e74c3c" stroke-width="2" transform="rotate(300)"/>
    </g>
    
    <!-- Central pupil/light source -->
    <circle cx="0" cy="0" r="25" fill="url(#lightGradient)" opacity="0.9" filter="url(#softGlow)"/>
    <circle cx="0" cy="0" r="15" fill="#fff" opacity="0.6"/>
    
    <!-- Light reflection/glint -->
    <ellipse cx="-8" cy="-8" rx="6" ry="4" fill="#fff" opacity="0.8"/>
  </g>
  
  <!-- Light rays emitting outward (reading/writing as light) -->
  <g opacity="0.4">
    <line x1="400" y1="350" x2="200" y2="150" stroke="#f39c12" stroke-width="2" opacity="0.3"/>
    <line x1="400" y1="350" x2="600" y2="150" stroke="#f39c12" stroke-width="2" opacity="0.3"/>
    <line x1="400" y1="350" x2="150" y2="350" stroke="#e74c3c" stroke-width="2" opacity="0.2"/>
    <line x1="400" y1="350" x2="650" y2="350" stroke="#e74c3c" stroke-width="2" opacity="0.2"/>
    <line x1="400" y1="350" x2="250" y2="550" stroke="#f1c40f" stroke-width="1.5" opacity="0.25"/>
    <line x1="400" y1="350" x2="550" y2="550" stroke="#f1c40f" stroke-width="1.5" opacity="0.25"/>
  </g>
  
  <!-- Subtle textural elements suggesting text/lines -->
  <g opacity="0.15">
    <line x1="250" y1="480" x2="550" y2="480" stroke="#ecf0f1" stroke-width="1"/>
    <line x1="270" y1="500" x2="530" y2="500" stroke="#ecf0f1" stroke-width="1"/>
    <line x1="300" y1="520" x2="500" y2="520" stroke="#ecf0f1" stroke-width="1"/>
  </g>
  
  <!-- Project Title -->
  <text x="400" y="620" 
        font-family="'Cormorant Garamond', 'Georgia', serif" 
        font-size="42" 
        font-weight="400"
        fill="#ecf0f1" 
        text-anchor="middle" 
        letter-spacing="8">ECHOES OF LIGHT</text>
  
  <!-- Tagline -->
  <text x="400" y="665" 
        font-family="'Cormorant Garamond', 'Georgia', serif" 
        font-size="16" 
        font-style="italic"
        fill="#bdc3c7" 
        text-anchor="middle" 
        letter-spacing="3">where photography meets prose</text>
  
  <!-- Small decorative elements -->
  <circle cx="230" cy="620" r="3" fill="#f39c12" opacity="0.6"/>
  <circle cx="570" cy="620" r="3" fill="#f39c12" opacity="0.6"/>
  
  <!-- Version/Branding mark (subtle) -->
  <text x="400" y="750" 
        font-family="monospace" 
        font-size="10" 
        fill="#7f8c8d" 
        text-anchor="middle" 
        opacity="0.4">✦ fiction × photography ✦</text>
</svg>
