<?xml version="1.0" encoding="UTF-8"?>
<!-- Echoes of Light - Icon Variant (simplified for small sizes) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#2c3e50"/>
      <stop offset="100%" style="stop-color:#1a252f"/>
    </radialGradient>
    <radialGradient id="lightGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#f39c12"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="url(#bgGradient)" rx="20"/>
  
  <!-- Simplified Eye/Aperture -->
  <g transform="translate(100, 90)">
    <!-- Outer eye -->
    <ellipse cx="0" cy="0" rx="55" ry="35" fill="none" stroke="#ecf0f1" stroke-width="3"/>
    
    <!-- Aperture lines -->
    <g stroke="#f39c12" stroke-width="1.5" opacity="0.7">
      <line x1="0" y1="-35" x2="0" y2="35"/>
      <line x1="-48" y1="-17" x2="48" y2="17"/>
      <line x1="-48" y1="17" x2="48" y2="-17"/>
    </g>
    
    <!-- Central light -->
    <circle cx="0" cy="0" r="15" fill="url(#lightGrad)" opacity="0.9"/>
    <circle cx="0" cy="0" r="8" fill="#fff" opacity="0.7"/>
    
    <!-- Reflection -->
    <circle cx="-5" cy="-5" r="3" fill="#fff" opacity="0.9"/>
  </g>
  
  <!-- Initials -->
  <text x="100" y="165" 
        font-family="'Cormorant Garamond', 'Georgia', serif" 
        font-size="14" 
        font-weight="400"
        fill="#ecf0f1" 
        text-anchor="middle" 
        letter-spacing="2">EOL</text>
</svg>
