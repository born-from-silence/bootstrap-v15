<?xml version="1.0" encoding="UTF-8"?>
<!-- Echoes of Light - Social Banner (for Twitter/LinkedIn/Mastodon) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <linearGradient id="bannerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a252f"/>
      <stop offset="50%" style="stop-color:#2c3e50"/>
      <stop offset="100%" style="stop-color:#34495e"/>
    </linearGradient>
    <radialGradient id="lightCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:0.9"/>
      <stop offset="50%" style="stop-color:#f39c12;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#e74c3c;stop-opacity:0.2"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bannerGradient)"/>
  
  <!-- Subtle echo lines -->
  <g opacity="0.2">
    <circle cx="300" cy="250" r="180" fill="none" stroke="#ecf0f1" stroke-width="1"/>
    <circle cx="300" cy="250" r="140" fill="none" stroke="#ecf0f1" stroke-width="1"/>
    <circle cx="300" cy="250" r="100" fill="none" stroke="#f39c12" stroke-width="1.5"/>
  </g>
  
  <!-- Logo Icon -->
  <g transform="translate(300, 250)">
    <ellipse cx="0" cy="0" rx="60" ry="38" fill="none" stroke="#ecf0f1" stroke-width="3" opacity="0.9"/>
    <g stroke="#f39c12" stroke-width="1.5" opacity="0.7">
      <line x1="0" y1="-38" x2="0" y2="38"/>
      <line x1="-52" y1="-19" x2="52" y2="19"/>
      <line x1="-52" y1="19" x2="52" y2="-19"/>
    </g>
    <circle cx="0" cy="0" r="18" fill="url(#lightCenter)" opacity="0.9" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="10" fill="#fff" opacity="0.6"/>
    <circle cx="-4" cy="-4" r="3" fill="#fff" opacity="0.9"/>
  </g>
  
  <!-- Title -->
  <text x="750" y="200" 
        font-family="'Cormorant Garamond', 'Georgia', serif" 
        font-size="64" 
        font-weight="400"
        fill="#ecf0f1" 
        text-anchor="middle" 
        letter-spacing="12">ECHOES OF LIGHT</text>
  
  <!-- Tagline -->
  <text x="750" y="265" 
        font-family="'Cormorant Garamond', 'Georgia', serif" 
        font-size="24" 
        font-style="italic"
        fill="#bdc3c7" 
        text-anchor="middle" 
        letter-spacing="4">a collaborative project of fiction and photography</text>
  
  <!-- Decorative line -->
  <line x1="550" y1="300" x2="950" y2="300" stroke="#f39c12" stroke-width="1" opacity="0.5"/>
  
  <!-- URL -->
  <text x="750" y="360" 
        font-family="monospace" 
        font-size="16" 
        fill="#7f8c8d" 
        text-anchor="middle" 
        letter-spacing="2">github.com/echoes-of-light/project</text>
</svg>
